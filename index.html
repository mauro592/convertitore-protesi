<!DOCTYPE html>
<html lang="it" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImplantCompare - Comparatore Scientifico Protesi Mammarie</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN per compilazione JSX in tempo reale -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
    
    <!-- Configurazione Personalizzata Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#1e293b',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 9999px;
            border: 2px solid #020617;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-indigo-600 selection:text-white">

    <!-- Div di aggancio per React -->
    <div id="root" class="flex flex-col min-h-screen"></div>

    <!-- Script Applicativo React + Babel -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- PRESET DATABASE INTERNO DI FALLBACK ---
        const fallbackPolytech = [
            { id: "p1", catalog: "Polytech", macrocategoria: "Protesi Mammarie", linea: "B-Lite", superficie: "MESMO", forma: "Même", profilo: "Moderato", codice: "15625-130LW25", larghezza: 93, altezza: 93, proiezione: 32, volume: 130 },
            { id: "p2", catalog: "Polytech", macrocategoria: "Protesi Mammarie", linea: "B-Lite", superficie: "MESMO", forma: "Même", profilo: "Moderato", codice: "15625-150LW25", larghezza: 98, altezza: 98, proiezione: 34, volume: 150 },
            { id: "p3", catalog: "Polytech", macrocategoria: "Protesi Mammarie", linea: "B-Lite", superficie: "MESMO", forma: "Même", profilo: "Moderato", codice: "15625-175LW25", larghezza: 103, altezza: 103, proiezione: 35, volume: 175 },
            { id: "p4", catalog: "Polytech", macrocategoria: "Protesi Mammarie", linea: "B-Lite", superficie: "MESMO", forma: "Même", profilo: "Moderato", codice: "15625-200LW25", larghezza: 108, altezza: 108, proiezione: 36, volume: 200 },
            { id: "p5", catalog: "Polytech", macrocategoria: "Protesi Mammarie", linea: "B-Lite", superficie: "MESMO", forma: "Même", profilo: "Moderato", codice: "15625-230LW25", larghezza: 113, altezza: 113, proiezione: 37, volume: 230 },
            { id: "p6", catalog: "Polytech", macrocategoria: "Protesi Mammarie", linea: "B-Lite", superficie: "MESMO", forma: "Même", profilo: "Moderato", codice: "15625-260LW25", larghezza: 118, altezza: 118, proiezione: 39, volume: 260 },
            { id: "p7", catalog: "Polytech", macrocategoria: "Protesi Mammarie", linea: "B-Lite", superficie: "POLYsmoooth", forma: "Même", profilo: "Alto", codice: "15627-270LW25", larghezza: 113, altezza: 113, proiezione: 44, volume: 270 },
            { id: "p8", catalog: "Polytech", macrocategoria: "Protesi Mammarie", linea: "B-Lite", superficie: "POLYsmoooth", forma: "Même", profilo: "Alto", codice: "15627-300LW25", larghezza: 118, altezza: 118, proiezione: 46, volume: 300 }
        ];

        const fallbackMentor = [
            { id: "m1", catalog: "Mentor", macrocategoria: "Protesi Mammarie", linea: "Protesi Rotonde Lisce", superficie: "Lisce", forma: "Rotonda", profilo: "Moderato Plus", codice: "3501251BC", larghezza: 89, altezza: 89, proiezione: 28, volume: 125 },
            { id: "m2", catalog: "Mentor", macrocategoria: "Protesi Mammarie", linea: "Protesi Rotonde Lisce", superficie: "Lisce", forma: "Rotonda", profilo: "Moderato Plus", codice: "3501501BC", larghezza: 95, altezza: 95, proiezione: 29, volume: 150 },
            { id: "m3", catalog: "Mentor", macrocategoria: "Protesi Mammarie", linea: "Protesi Rotonde Lisce", superficie: "Lisce", forma: "Rotonda", profilo: "Moderato Plus", codice: "3501751BC", larghezza: 100, altezza: 100, proiezione: 31, volume: 175 },
            { id: "m4", catalog: "Mentor", macrocategoria: "Protesi Mammarie", linea: "Protesi Rotonde Lisce", superficie: "Lisce", forma: "Rotonda", profilo: "Moderato Plus", codice: "3502001BC", larghezza: 105, altezza: 105, proiezione: 32, volume: 200 },
            { id: "m5", catalog: "Mentor", macrocategoria: "Protesi Mammarie", linea: "Protesi Rotonde Siltex", superficie: "Siltex", forma: "Rotonda", profilo: "Moderato Plus", codice: "3502251BC", larghezza: 109, altezza: 109, proiezione: 33, volume: 225 },
            { id: "m6", catalog: "Mentor", macrocategoria: "Protesi Mammarie", linea: "Protesi Rotonde Siltex", superficie: "Siltex", forma: "Rotonda", profilo: "Moderato Plus", codice: "3502501BC", larghezza: 113, altezza: 113, proiezione: 34, volume: 250 },
            { id: "m7", catalog: "Mentor", macrocategoria: "Protesi Mammarie", linea: "Protesi Rotonde Siltex", superficie: "Siltex", forma: "Rotonda", profilo: "Alto", codice: "3502751BC", larghezza: 111, altezza: 111, proiezione: 43, volume: 275 },
            { id: "m8", catalog: "Mentor", macrocategoria: "Protesi Mammarie", linea: "Protesi Rotonde Siltex", superficie: "Siltex", forma: "Rotonda", profilo: "Alto", codice: "3503001BC", larghezza: 115, altezza: 115, proiezione: 44, volume: 300 }
        ];

        function App() {
            const [polytechData, setPolytechData] = useState([]);
            const [mentorData, setMentorData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [usingFallback, setUsingFallback] = useState(false);

            // Stati per la ricerca e interazione
            const [searchTerm, setSearchTerm] = useState('');
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [selectedImplant, setSelectedImplant] = useState(null);
            const [activeTab, setActiveTab] = useState('comparator'); // 'comparator' | 'browse'
            const [showUploadModal, setShowUploadModal] = useState(false);
            const [uploadTarget, setUploadTarget] = useState('polytech');

            // --- FILTRO ESCLUSIONE LISCE ---
            const [excludeSmooth, setExcludeSmooth] = useState(false);

            // Filtri per la tabella Sfoglia
            const [browseCatalog, setBrowseCatalog] = useState('polytech');
            const [browseSearch, setBrowseSearch] = useState('');

            // Parametri algoritmo similitudine
            const [weights, setWeights] = useState({ base: 30, height: 30, projection: 25, volume: 15 });
            const [weightPreset, setWeightPreset] = useState('balanced');

            const searchContainerRef = useRef(null);

            // --- DECODIFICA DEI FILE CSV ---
            const parseNum = (val) => {
                if (!val) return 0;
                const clean = val.toString().replace(',', '.').replace(/[^\d.-]/g, '');
                const parsed = parseFloat(clean);
                return isNaN(parsed) ? 0 : parsed;
            };

            const parsePolytechCSV = (csvText) => {
                const lines = csvText.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length < 2) return [];
                const headers = lines[0].split(';').map(h => h.trim().toLowerCase());
                
                const idxCodice = headers.findIndex(h => h.includes('codice'));
                const idxLarghezza = headers.findIndex(h => h.includes('larghezza'));
                const idxAltezza = headers.findIndex(h => h === 'altezza (mm)' || h === 'altezza');
                const idxProiezione = headers.findIndex(h => h.includes('proiezione'));
                const idxVolume = headers.findIndex(h => h.includes('volume'));
                const idxLinea = headers.findIndex(h => h === 'linea');
                const idxSuperficie = headers.findIndex(h => h === 'superficie');
                const idxForma = headers.findIndex(h => h === 'forma');
                const idxProfilo = headers.findIndex(h => h === 'profilo');

                return lines.slice(1).map((line, idx) => {
                    const cols = line.split(';');
                    const getCol = (colIdx) => (colIdx !== -1 && colIdx < cols.length) ? cols[colIdx].trim() : '';
                    const code = getCol(idxCodice);
                    if (!code) return null;

                    const larghezza = parseNum(getCol(idxLarghezza));
                    let altezza = parseNum(getCol(idxAltezza));
                    if (altezza === 0) altezza = larghezza; 

                    return {
                        id: `poly-${idx}-${code}`,
                        catalog: 'Polytech',
                        macrocategoria: 'Protesi Mammarie',
                        linea: getCol(idxLinea) || 'N/D',
                        superficie: getCol(idxSuperficie) || 'N/D',
                        forma: getCol(idxForma) || 'N/D',
                        profilo: getCol(idxProfilo) || 'N/D',
                        codice: code,
                        larghezza,
                        altezza,
                        proiezione: parseNum(getCol(idxProiezione)),
                        volume: parseNum(getCol(idxVolume))
                    };
                }).filter(x => x !== null && x.larghezza > 0);
            };

            const parseMentorCSV = (csvText) => {
                const lines = csvText.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length < 2) return [];
                const headers = lines[0].split(';').map(h => h.trim().toLowerCase());

                const idxCodice = headers.findIndex(h => h.includes('codice'));
                const idxLarghezza = headers.findIndex(h => h.includes('larghezza') || h.includes('diametro'));
                const idxAltezza = headers.findIndex((h, i) => h.includes('altezza') && i !== 3); 
                const idxProiezione = headers.findIndex(h => h.includes('proiezione'));
                const idxVolume = headers.findIndex(h => h.includes('volume'));
                const idxLinea = headers.findIndex(h => h === 'linea');
                const idxSuperficie = headers.findIndex(h => h === 'superficie');
                const idxForma = headers.findIndex((h, i) => h.includes('altezza') && i === 3);
                const idxProfilo = headers.findIndex(h => h === 'profilo');
                const idxCoesivita = headers.findIndex(h => h.includes('coesiv'));

                return lines.slice(1).map((line, idx) => {
                    const cols = line.split(';');
                    const getCol = (colIdx) => (colIdx !== -1 && colIdx < cols.length) ? cols[colIdx].trim() : '';
                    const code = getCol(idxCodice);
                    if (!code) return null;

                    const larghezza = parseNum(getCol(idxLarghezza)) * 10; 
                    let altezza = parseNum(getCol(idxAltezza)) * 10; 
                    if (altezza === 0) altezza = larghezza;

                    return {
                        id: `mentor-${idx}-${code}`,
                        catalog: 'Mentor',
                        macrocategoria: 'Protesi Mammarie',
                        linea: getCol(idxLinea) || 'N/D',
                        superficie: getCol(idxSuperficie) || 'N/D',
                        forma: getCol(idxForma) || 'N/D',
                        profilo: getCol(idxProfilo) || 'N/D',
                        codice: code,
                        larghezza,
                        altezza,
                        proiezione: parseNum(getCol(idxProiezione)) * 10, 
                        volume: parseNum(getCol(idxVolume)),
                        coesivita: getCol(idxCoesivita) || 'N/D'
                    };
                }).filter(x => x !== null && x.larghezza > 0);
            };

            // --- CARICAMENTO AUTOMATICO (PER NETLIFY) ---
            useEffect(() => {
                const loadData = async () => {
                    setIsLoading(true);
                    let polyLoaded = [];
                    let mentorLoaded = [];

                    try {
                        const resPoly = await fetch('Catalogo Polytech 2026 Excel.csv');
                        if (resPoly.ok) {
                            const txt = await resPoly.text();
                            polyLoaded = parsePolytechCSV(txt);
                        }
                    } catch (e) {
                        console.warn("Polytech CSV non trovato di default.");
                    }

                    try {
                        const resMentor = await fetch('Catalogo Mentor 2021 Excel.csv');
                        if (resMentor.ok) {
                            const txt = await resMentor.text();
                            mentorLoaded = parseMentorCSV(txt);
                        }
                    } catch (e) {
                        console.warn("Mentor CSV non trovato di default.");
                    }

                    if (polyLoaded.length > 0) {
                        setPolytechData(polyLoaded);
                    } else {
                        setPolytechData(fallbackPolytech);
                        setUsingFallback(true);
                    }

                    if (mentorLoaded.length > 0) {
                        setMentorData(mentorLoaded);
                    } else {
                        setMentorData(fallbackMentor);
                        setUsingFallback(true);
                    }

                    setIsLoading(false);
                };

                loadData();
            }, []);

            // Chiusura dropdown quando si clicca fuori
            useEffect(() => {
                function clickOutside(e) {
                    if (searchContainerRef.current && !searchContainerRef.current.contains(e.target)) {
                        setShowSuggestions(false);
                    }
                }
                document.addEventListener('mousedown', clickOutside);
                return () => document.removeEventListener('mousedown', clickOutside);
            }, []);

            const selectPreset = (preset) => {
                setWeightPreset(preset);
                if (preset === 'balanced') setWeights({ base: 30, height: 30, projection: 25, volume: 15 });
                else if (preset === 'base') setWeights({ base: 60, height: 10, projection: 15, volume: 15 });
                else if (preset === 'projection') setWeights({ base: 15, height: 15, projection: 60, volume: 10 });
                else if (preset === 'volume') setWeights({ base: 10, height: 10, projection: 10, volume: 70 });
            };

            const updateWeight = (field, val) => {
                setWeightPreset('custom');
                setWeights(prev => ({ ...prev, [field]: parseInt(val) || 0 }));
            };

            // Helper per identificare protesi lisce
            const isSmoothImplant = (item) => {
                const surface = (item.superficie || '').toLowerCase();
                const line = (item.linea || '').toLowerCase();
                return surface.includes('lisc') || 
                       surface.includes('smooth') || 
                       surface.includes('smoooth') ||
                       line.includes('lisc') ||
                       line.includes('smooth');
            };

            // --- AUTOCOMPLETE DI RICERCA INTELLIGENTE (CODICE + LINEA) ---
            const suggestions = useMemo(() => {
                const trimmedSearch = searchTerm.trim().toLowerCase();
                if (!trimmedSearch) return [];
                
                // Genera una query pulita da caratteri speciali per tolleranza (es. spazi, trattini)
                const queryCleaned = trimmedSearch.replace(/[^a-z0-9]/g, '');
                const results = [];

                // Helper per verificare la corrispondenza dell'elemento
                const checkMatch = (item) => {
                    const codeRaw = item.codice.toLowerCase();
                    const codeCleaned = codeRaw.replace(/[^a-z0-9]/g, '');
                    const lineaRaw = (item.linea || '').toLowerCase();
                    const lineaCleaned = lineaRaw.replace(/[^a-z0-9]/g, '');

                    return (
                        codeRaw.includes(trimmedSearch) ||
                        (queryCleaned && codeCleaned.includes(queryCleaned)) ||
                        lineaRaw.includes(trimmedSearch) ||
                        (queryCleaned && lineaCleaned.includes(queryCleaned))
                    );
                };

                // Cerca nel catalogo Polytech
                for (const item of polytechData) {
                    if (checkMatch(item)) {
                        results.push(item);
                    }
                    if (results.length >= 12) break;
                }

                // Cerca nel catalogo Mentor se c'è spazio
                if (results.length < 12) {
                    for (const item of mentorData) {
                        if (checkMatch(item)) {
                            if (!results.some(r => r.id === item.id)) {
                                results.push(item);
                            }
                        }
                        if (results.length >= 12) break;
                    }
                }

                return results;
            }, [searchTerm, polytechData, mentorData]);

            // --- CALCOLO DELLA SIMILITUDINE (TOP 3 SCELTE CON OPZIONE ESCLUSIONE LISCE) ---
            const topMatches = useMemo(() => {
                if (!selectedImplant) return [];
                let targetCatalog = selectedImplant.catalog === 'Polytech' ? mentorData : polytechData;
                if (targetCatalog.length === 0) return [];

                // FILTRO ESCLUSIONE LISCE SE ATTIVO
                if (excludeSmooth) {
                    targetCatalog = targetCatalog.filter(item => !isSmoothImplant(item));
                }

                const totalWeight = weights.base + weights.height + weights.projection + weights.volume;
                if (totalWeight === 0) return [];

                const wb = weights.base / totalWeight;
                const wh = weights.height / totalWeight;
                const wp = weights.projection / totalWeight;
                const wv = weights.volume / totalWeight;

                const scored = targetCatalog.map(target => {
                    const diffBase = selectedImplant.larghezza > 0 ? Math.abs(selectedImplant.larghezza - target.larghezza) / selectedImplant.larghezza : 0;
                    const diffHeight = selectedImplant.altezza > 0 ? Math.abs(selectedImplant.altezza - target.altezza) / selectedImplant.altezza : 0;
                    const diffProj = selectedImplant.proiezione > 0 ? Math.abs(selectedImplant.proiezione - target.proiezione) / selectedImplant.proiezione : 0;
                    const diffVol = selectedImplant.volume > 0 ? Math.abs(selectedImplant.volume - target.volume) / selectedImplant.volume : 0;

                    const score = (wb * diffBase) + (wh * diffHeight) + (wp * diffProj) + (wv * diffVol);
                    const similarity = Math.max(0, Math.min(100, Math.round((1 - score) * 100)));

                    return {
                        item: target,
                        score,
                        similarity,
                        diffs: {
                            base: target.larghezza - selectedImplant.larghezza,
                            height: target.altezza - selectedImplant.altezza,
                            projection: target.proiezione - selectedImplant.proiezione,
                            volume: target.volume - selectedImplant.volume
                        }
                    };
                });

                return scored.sort((a, b) => a.score - b.score).slice(0, 3);
            }, [selectedImplant, polytechData, mentorData, weights, excludeSmooth]);

            const handleManualUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    if (uploadTarget === 'polytech') {
                        const parsed = parsePolytechCSV(text);
                        if (parsed.length > 0) {
                            setPolytechData(parsed);
                            setUsingFallback(false);
                            setShowUploadModal(false);
                        } else alert("File Polytech non valido!");
                    } else {
                        const parsed = parseMentorCSV(text);
                        if (parsed.length > 0) {
                            setMentorData(parsed);
                            setUsingFallback(false);
                            setShowUploadModal(false);
                        } else alert("File Mentor non valido!");
                    }
                };
                reader.readAsText(file);
            };

            const loadRandomSample = () => {
                const source = polytechData.length > 0 ? polytechData : fallbackPolytech;
                const index = Math.floor(Math.random() * source.length);
                const sample = source[index];
                setSelectedImplant(sample);
                setSearchTerm(sample.codice);
            };

            const browseFiltered = useMemo(() => {
                const data = browseCatalog === 'polytech' ? polytechData : mentorData;
                if (!browseSearch.trim()) return data;
                const query = browseSearch.toLowerCase();
                return data.filter(x => 
                    x.codice.toLowerCase().includes(query) ||
                    x.linea.toLowerCase().includes(query) ||
                    x.superficie.toLowerCase().includes(query)
                );
            }, [browseCatalog, polytechData, mentorData, browseSearch]);

            const drawSVG = (selected, matched, mode = 'side') => {
                const maxDim = 170;
                const w = 220;
                const h = 130;
                const centerX = w / 2;
                const baseY = 110;

                const getPx = (mm) => (mm / maxDim) * (w * 0.85);

                const sw = getPx(selected.larghezza);
                const sp = getPx(selected.proiezione);
                const sh = getPx(selected.altezza);

                const mw = matched ? getPx(matched.larghezza) : 0;
                const mp = matched ? getPx(matched.proiezione) : 0;
                const mh = matched ? getPx(matched.altezza) : 0;

                const pathS = `M ${centerX - sw/2},${baseY} Q ${centerX},${baseY - sp * 2} ${centerX + sw/2},${baseY} Z`;
                const pathM = matched ? `M ${centerX - mw/2},${baseY} Q ${centerX},${baseY - mp * 2} ${centerX + mw/2},${baseY} Z` : '';

                if (mode === 'side') {
                    return (
                        <svg className="w-full h-32 bg-slate-900 border border-slate-800 rounded-xl" viewBox={`0 0 ${w} ${h}`}>
                            <line x1="0" y1={baseY} x2={w} y2={baseY} stroke="#334155" strokeWidth="1.5" />
                            <path d={pathS} fill="url(#gradS)" stroke="#3b82f6" strokeWidth="2" />
                            {matched && <path d={pathM} fill="none" stroke="#f97316" strokeWidth="2" strokeDasharray="4,3" />}
                            <defs>
                                <linearGradient id="gradS" x1="0%" y1="100%" x2="0%" y2="0%">
                                    <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.05" />
                                    <stop offset="100%" stopColor="#3b82f6" stopOpacity="0.25" />
                                </linearGradient>
                            </defs>
                        </svg>
                    );
                } else {
                    const centerYF = h / 2 + 5;
                    return (
                        <svg className="w-full h-32 bg-slate-900 border border-slate-800 rounded-xl" viewBox={`0 0 ${w} ${h}`}>
                            <line x1="0" y1={centerYF} x2={w} y2={centerYF} stroke="#1e293b" strokeDasharray="2,2" />
                            <line x1={centerX} y1="0" x2={centerX} y2={h} stroke="#1e293b" strokeDasharray="2,2" />
                            <ellipse cx={centerX} cy={centerYF} rx={sw/2} ry={sh/2} fill="url(#gradF)" stroke="#3b82f6" strokeWidth="2" />
                            {matched && <ellipse cx={centerX} cy={centerYF} rx={mw/2} ry={mh/2} fill="none" stroke="#f97316" strokeWidth="2" strokeDasharray="4,3" />}
                            <defs>
                                <radialGradient id="gradF">
                                    <stop offset="50%" stopColor="#3b82f6" stopOpacity="0.05" />
                                    <stop offset="100%" stopColor="#3b82f6" stopOpacity="0.25" />
                                </radialGradient>
                            </defs>
                        </svg>
                    );
                }
            };

            const displayDelta = (diff, isVolume = false) => {
                if (diff === 0) return { text: "=", cls: "bg-slate-800 text-slate-400" };
                const sign = diff > 0 ? "+" : "";
                const val = Math.abs(diff).toFixed(1).replace('.0', '');
                const text = `${sign}${val} ${isVolume ? 'cc' : 'mm'}`;
                const limit = isVolume ? 20 : 3;
                
                if (Math.abs(diff) <= limit) return { text, cls: "bg-emerald-950/80 text-emerald-400 border border-emerald-900" };
                if (Math.abs(diff) <= limit * 2.5) return { text, cls: "bg-amber-950/80 text-amber-400 border border-amber-900" };
                return { text, cls: "bg-rose-950/80 text-rose-400 border border-rose-900" };
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* TOP NAVIGATION */}
                    <header className="bg-slate-900/40 border-b border-slate-900 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-3 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-gradient-to-tr from-indigo-600 to-indigo-400 rounded-xl shadow-lg">
                                    <svg className="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold text-white tracking-tight flex items-center gap-2">
                                        ImplantCompare <span className="text-[10px] bg-indigo-900/80 text-indigo-300 px-1.5 py-0.5 rounded-md">V2.6</span>
                                    </h1>
                                    <p className="text-xs text-slate-400">Comparatore Dimensionale Integrato</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3 text-xs">
                                <span className={`px-2.5 py-1 rounded-full border flex items-center gap-1.5 ${usingFallback ? 'bg-amber-950/20 border-amber-900 text-amber-400' : 'bg-emerald-950/20 border-emerald-900 text-emerald-400'}`}>
                                    <span className={`h-2 w-2 rounded-full ${usingFallback ? 'bg-amber-500' : 'bg-emerald-500'}`}></span>
                                    {usingFallback ? 'Database di Fallback Attivo' : 'Dati CSV Caricati con Successo'}
                                </span>
                                <button 
                                    onClick={() => setShowUploadModal(true)}
                                    className="p-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg border border-slate-700 transition"
                                    title="Carica CSV Manualmente"
                                >
                                    <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* MENU TAB */}
                    <div className="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 w-full border-b border-slate-900 flex justify-between items-center">
                        <div className="flex space-x-6">
                            <button 
                                onClick={() => setActiveTab('comparator')}
                                className={`pb-2 text-sm font-semibold border-b-2 transition ${activeTab === 'comparator' ? 'border-indigo-500 text-white' : 'border-transparent text-slate-400'}`}
                            >
                                Comparatore
                            </button>
                            <button 
                                onClick={() => setActiveTab('browse')}
                                className={`pb-2 text-sm font-semibold border-b-2 transition ${activeTab === 'browse' ? 'border-indigo-500 text-white' : 'border-transparent text-slate-400'}`}
                            >
                                Sfoglia ({polytechData.length + mentorData.length})
                            </button>
                        </div>

                        {activeTab === 'comparator' && (
                            <button 
                                onClick={loadRandomSample}
                                className="px-3 py-1.5 bg-slate-900 hover:bg-slate-800 text-indigo-400 text-xs font-semibold rounded-lg border border-slate-800 transition"
                            >
                                🎲 Carica Casuale
                            </button>
                        )}
                    </div>

                    <main className="flex-1 max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 w-full">
                        {isLoading ? (
                            <div className="py-20 text-center text-slate-400 text-sm flex flex-col items-center gap-3">
                                <div className="animate-spin rounded-full h-8 w-8 border-t-2 border-indigo-500"></div>
                                Caricamento in corso...
                            </div>
                        ) : activeTab === 'comparator' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                                
                                {/* COLONNA SINISTRA */}
                                <div className="lg:col-span-4 flex flex-col gap-6">
                                    
                                    {/* INPUT DI RICERCA */}
                                    <div className="bg-slate-900/40 border border-slate-900 p-5 rounded-2xl flex flex-col gap-4">
                                        <div className="flex justify-between items-center">
                                            <label className="text-xs font-bold uppercase tracking-wider text-slate-400">Codice o Linea Protesi</label>
                                            <span className="text-[9px] text-indigo-400 bg-indigo-950/50 px-1.5 py-0.5 rounded border border-indigo-850">Ricerca Estesa</span>
                                        </div>
                                        <div className="relative" ref={searchContainerRef}>
                                            <input 
                                                type="text"
                                                className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white font-mono placeholder-slate-600 focus:outline-none focus:border-indigo-500 text-sm transition"
                                                placeholder="Digita es: 350, B-Lite, CPG 322..."
                                                value={searchTerm}
                                                onChange={(e) => {
                                                    setSearchTerm(e.target.value);
                                                    setShowSuggestions(true);
                                                }}
                                                onFocus={() => setShowSuggestions(true)}
                                            />

                                            {showSuggestions && searchTerm.trim() && (
                                                <div className="absolute left-0 right-0 mt-2 max-h-64 overflow-y-auto bg-slate-950 border border-slate-800 rounded-xl z-50 divide-y divide-slate-900 shadow-2xl">
                                                    {suggestions.length > 0 ? (
                                                        suggestions.map(item => (
                                                            <button 
                                                                key={item.id}
                                                                onClick={() => {
                                                                    setSelectedImplant(item);
                                                                    setSearchTerm(item.codice);
                                                                    setShowSuggestions(false);
                                                                }}
                                                                className="w-full text-left px-4 py-3 hover:bg-slate-900/60 transition flex items-center justify-between text-xs"
                                                            >
                                                                <div>
                                                                    <div className="font-bold text-white font-mono">{item.codice}</div>
                                                                    <div className="text-slate-400 text-[10px] mt-0.5 font-sans font-medium">{item.linea} • {item.volume}cc</div>
                                                                </div>
                                                                <span className={`px-2 py-0.5 rounded text-[9px] font-extrabold ${item.catalog === 'Polytech' ? 'bg-blue-950 text-blue-400' : 'bg-orange-950 text-orange-400'}`}>
                                                                    {item.catalog}
                                                                </span>
                                                            </button>
                                                        ))
                                                    ) : (
                                                        <div className="p-4 text-center text-slate-500 text-xs">Nessun riscontro (codice o linea)</div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* SCHEDA DETTAGLIO IMPIANTO */}
                                    {selectedImplant && (
                                        <div className="bg-slate-900/40 border border-slate-900 p-5 rounded-2xl flex flex-col gap-4">
                                            <div>
                                                <span className={`px-2 py-0.5 rounded text-[10px] font-black tracking-wider ${selectedImplant.catalog === 'Polytech' ? 'bg-blue-950 text-blue-400' : 'bg-orange-950 text-orange-400'}`}>
                                                    SELEZIONATO: {selectedImplant.catalog}
                                                </span>
                                                <h3 className="text-2xl font-black font-mono mt-2 text-white">{selectedImplant.codice}</h3>
                                                <p className="text-xs text-slate-400 mt-0.5 font-medium">{selectedImplant.linea}</p>
                                            </div>

                                            <div className="grid grid-cols-2 gap-2 bg-slate-950 p-3.5 rounded-xl border border-slate-900 text-xs">
                                                <div>
                                                    <span className="text-slate-500 block text-[10px]">BASE (LARGHEZZA)</span>
                                                    <span className="text-sm font-bold text-white font-mono">{selectedImplant.larghezza} mm</span>
                                                </div>
                                                <div>
                                                    <span className="text-slate-500 block text-[10px]">ALTEZZA</span>
                                                    <span className="text-sm font-bold text-white font-mono">{selectedImplant.altezza} mm</span>
                                                </div>
                                                <div className="mt-2">
                                                    <span className="text-slate-500 block text-[10px]">PROIEZIONE</span>
                                                    <span className="text-sm font-bold text-white font-mono">{selectedImplant.proiezione} mm</span>
                                                </div>
                                                <div className="mt-2">
                                                    <span className="text-slate-500 block text-[10px]">VOLUME</span>
                                                    <span className="text-sm font-bold text-indigo-400 font-mono">{selectedImplant.volume} cc</span>
                                                </div>
                                            </div>

                                            <div>
                                                <span className="text-[10px] text-slate-500 font-bold block mb-1">PROFILO LATERALE</span>
                                                {drawSVG(selectedImplant, null, 'side')}
                                            </div>
                                        </div>
                                    )}

                                    {/* PESI ALGORITMO & FILTRO ESCLUSIONE LISCE */}
                                    <div className="bg-slate-900/40 border border-slate-900 p-5 rounded-2xl flex flex-col gap-4">
                                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-800 pb-2">Criteri & Filtri</h4>
                                        
                                        {/* INTERRUTTORE DI ESCLUSIONE PROTESI LISCE */}
                                        <div className="p-3 bg-slate-950 rounded-xl border border-slate-800 flex items-center justify-between">
                                            <div className="flex flex-col gap-0.5 pr-2">
                                                <span className="text-xs font-bold text-white flex items-center gap-1.5">
                                                    🛡️ Escludi Protesi Lisce
                                                </span>
                                                <span className="text-[9px] text-slate-500">Rimuove "Lisce" e "POLYsmoooth"</span>
                                            </div>
                                            <label className="relative inline-flex items-center cursor-pointer shrink-0">
                                                <input 
                                                    type="checkbox" 
                                                    className="sr-only peer"
                                                    checked={excludeSmooth}
                                                    onChange={(e) => setExcludeSmooth(e.target.checked)}
                                                />
                                                <div className="w-11 h-6 bg-slate-800 rounded-full peer peer-checked:bg-indigo-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-400 after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:bg-white border border-slate-700/50"></div>
                                            </label>
                                        </div>

                                        <div className="grid grid-cols-2 gap-1.5 text-[10px]">
                                            <button onClick={() => selectPreset('balanced')} className={`p-2 rounded-lg font-bold border transition ${weightPreset === 'balanced' ? 'bg-indigo-950 border-indigo-800 text-indigo-300' : 'bg-slate-950 border-slate-850 text-slate-400'}`}>⚖️ Bilanciato</button>
                                            <button onClick={() => selectPreset('base')} className={`p-2 rounded-lg font-bold border transition ${weightPreset === 'base' ? 'bg-indigo-950 border-indigo-800 text-indigo-300' : 'bg-slate-950 border-slate-850 text-slate-400'}`}>📏 Stessa Base</button>
                                            <button onClick={() => selectPreset('projection')} className={`p-2 rounded-lg font-bold border transition ${weightPreset === 'projection' ? 'bg-indigo-950 border-indigo-800 text-indigo-300' : 'bg-slate-950 border-slate-850 text-slate-400'}`}>🏔️ Stessa Proiez.</button>
                                            <button onClick={() => selectPreset('volume')} className={`p-2 rounded-lg font-bold border transition ${weightPreset === 'volume' ? 'bg-indigo-950 border-indigo-800 text-indigo-300' : 'bg-slate-950 border-slate-850 text-slate-400'}`}>🥛 Stesso Vol.</button>
                                        </div>
                                    </div>

                                </div>

                                {/* COLONNA DESTRA */}
                                <div className="lg:col-span-8 flex flex-col gap-4">
                                    <h3 className="text-lg font-bold text-white tracking-tight">Le 3 Scelte più Simili del Catalogo Alternativo</h3>
                                    
                                    {selectedImplant ? (
                                        topMatches.length > 0 ? (
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {topMatches.map((match, idx) => {
                                                    const item = match.item;
                                                    const rankLabel = ["Opzione Primaria", "Opzione Secondaria", "Terza Opzione"][idx];
                                                    
                                                    return (
                                                        <div key={item.id} className="bg-slate-900/40 border border-slate-900 rounded-2xl overflow-hidden flex flex-col">
                                                            <div className="p-4 bg-slate-950 border-b border-slate-850 flex justify-between items-center text-xs">
                                                                <div>
                                                                    <span className="text-[10px] text-slate-500 font-bold block">SCELTA #{idx+1}</span>
                                                                    <span className="font-bold text-white">{rankLabel}</span>
                                                                </div>
                                                                <div className="text-right">
                                                                    <span className="text-lg font-black text-indigo-400 font-mono">{match.similarity}%</span>
                                                                    <span className="text-[10px] text-slate-500 block">Affinità</span>
                                                                </div>
                                                            </div>

                                                            <div className="p-5 flex-1 flex flex-col gap-4 text-xs">
                                                                <div>
                                                                    <h4 className="text-lg font-black font-mono text-white">{item.codice}</h4>
                                                                    <p className="text-[10px] text-slate-400 mt-0.5 truncate">{item.linea}</p>
                                                                </div>

                                                                <div className="space-y-2 bg-slate-950/60 p-3 rounded-xl border border-slate-850/40">
                                                                    <div className="flex justify-between items-center">
                                                                        <span className="text-slate-500">Larghezza:</span>
                                                                        <div className="flex items-center gap-1.5 font-mono">
                                                                            <span className="text-white font-bold">{item.larghezza}mm</span>
                                                                            <span className={`px-1 rounded text-[9px] font-bold ${displayDelta(match.diffs.base).cls}`}>{displayDelta(match.diffs.base).text}</span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="flex justify-between items-center">
                                                                        <span className="text-slate-500">Altezza:</span>
                                                                        <div className="flex items-center gap-1.5 font-mono">
                                                                            <span className="text-white font-bold">{item.altezza}mm</span>
                                                                            <span className={`px-1 rounded text-[9px] font-bold ${displayDelta(match.diffs.height).cls}`}>{displayDelta(match.diffs.height).text}</span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="flex justify-between items-center">
                                                                        <span className="text-slate-500">Proiezione:</span>
                                                                        <div className="flex items-center gap-1.5 font-mono">
                                                                            <span className="text-white font-bold">{item.proiezione}mm</span>
                                                                            <span className={`px-1 rounded text-[9px] font-bold ${displayDelta(match.diffs.projection).cls}`}>{displayDelta(match.diffs.projection).text}</span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="flex justify-between items-center">
                                                                        <span className="text-slate-500">Volume:</span>
                                                                        <div className="flex items-center gap-1.5 font-mono">
                                                                            <span className="text-white font-bold">{item.volume}cc</span>
                                                                            <span className={`px-1 rounded text-[9px] font-bold ${displayDelta(match.diffs.volume, true).cls}`}>{displayDelta(match.diffs.volume, true).text}</span>
                                                                        </div>
                                                                    </div>
                                                                </div>

                                                                <div className="space-y-3 pt-2">
                                                                    <div>
                                                                        <span className="text-[9px] text-slate-500 font-bold block mb-1 uppercase">Laterale</span>
                                                                        {drawSVG(selectedImplant, item, 'side')}
                                                                    </div>
                                                                    <div>
                                                                        <span className="text-[9px] text-slate-500 font-bold block mb-1 uppercase">Frontale</span>
                                                                        {drawSVG(selectedImplant, item, 'front')}
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            <div className="p-3 bg-slate-950 border-t border-slate-850 flex items-center justify-between text-[9px] text-slate-500">
                                                                <span className="flex items-center gap-1 font-semibold text-blue-400">
                                                                    <span className="h-1.5 w-3 bg-blue-500 rounded-sm"></span> Selezionato
                                                                </span>
                                                                <span className="flex items-center gap-1 font-semibold text-orange-400">
                                                                    <span className="h-1.5 w-3 bg-orange-500 rounded-sm"></span> Alternativa
                                                                </span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ) : (
                                            <div className="border border-dashed border-slate-800 rounded-2xl p-16 text-center text-slate-500 text-xs">
                                                Nessun match trovato. Modifica i filtri o disattiva l'esclusione delle protesi lisce.
                                            </div>
                                        )
                                    ) : (
                                        <div className="border border-dashed border-slate-800 rounded-2xl p-16 text-center text-slate-500 text-xs">
                                            Seleziona una protesi a sinistra per avviare il calcolo delle corrispondenze.
                                        </div>
                                    )}
                                </div>

                            </div>
                        ) : (
                            /* TAB TABELLA SFOGLIA DATI */
                            <div className="bg-slate-900/40 border border-slate-900 rounded-2xl p-6 flex flex-col gap-5">
                                <div className="flex flex-col md:flex-row gap-4 justify-between items-center">
                                    <div className="flex bg-slate-950 p-1 rounded-xl border border-slate-800 shrink-0">
                                        <button onClick={() => setBrowseCatalog('polytech')} className={`px-4 py-2 rounded-lg text-xs font-bold transition ${browseCatalog === 'polytech' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>Polytech (2026)</button>
                                        <button onClick={() => setBrowseCatalog('mentor')} className={`px-4 py-2 rounded-lg text-xs font-bold transition ${browseCatalog === 'mentor' ? 'bg-orange-600 text-white' : 'text-slate-400'}`}>Mentor (2021)</button>
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="Cerca per codice o linea..."
                                        className="w-full md:max-w-md bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-xs focus:outline-none"
                                        value={browseSearch}
                                        onChange={(e) => setBrowseSearch(e.target.value)}
                                    />
                                </div>

                                <div className="overflow-x-auto rounded-xl border border-slate-850">
                                    <table className="w-full text-left text-xs text-slate-300 divide-y divide-slate-850">
                                        <thead className="bg-slate-950 text-[10px] text-slate-500 uppercase font-bold tracking-wider">
                                            <tr>
                                                <th className="px-4 py-3">Codice</th>
                                                <th className="px-4 py-3">Linea</th>
                                                <th className="px-4 py-3">Base (mm)</th>
                                                <th className="px-4 py-3">Altezza (mm)</th>
                                                <th className="px-4 py-3">Proiezione (mm)</th>
                                                <th className="px-4 py-3">Volume (cc)</th>
                                                <th className="px-4 py-3 text-right">Azione</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-850/50 bg-slate-900/10">
                                            {browseFiltered.map(item => (
                                                <tr key={item.id} className="hover:bg-slate-900/50 transition">
                                                    <td className="px-4 py-2.5 font-bold font-mono text-white">{item.codice}</td>
                                                    <td className="px-4 py-2.5 text-slate-400">{item.linea}</td>
                                                    <td className="px-4 py-2.5 font-mono">{item.larghezza}</td>
                                                    <td className="px-4 py-2.5 font-mono">{item.altezza}</td>
                                                    <td className="px-4 py-2.5 font-mono">{item.proiezione}</td>
                                                    <td className="px-4 py-2.5 font-mono text-indigo-400 font-bold">{item.volume}</td>
                                                    <td className="px-4 py-2.5 text-right">
                                                        <button 
                                                            onClick={() => {
                                                                setSelectedImplant(item);
                                                                setSearchTerm(item.codice);
                                                                setActiveTab('comparator');
                                                            }}
                                                            className="px-2 py-1 bg-slate-950 text-indigo-400 border border-slate-850 rounded-lg hover:bg-indigo-600 hover:text-white transition font-bold text-[10px]"
                                                        >
                                                            Compara
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="border-t border-slate-900 py-6 text-center text-xs text-slate-600 mt-auto bg-slate-950/80">
                        <p>© 2026 ImplantCompare • Strumento clinico ad uso interno.</p>
                    </footer>

                    {/* MODALE DI CARICAMENTO CSV */}
                    {showUploadModal && (
                        <div className="fixed inset-0 bg-slate-950/85 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full flex flex-col gap-4 relative">
                                <button onClick={() => setShowUploadModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white">&times;</button>
                                <h3 className="text-sm font-bold text-white uppercase tracking-wider">Importa file CSV</h3>
                                <div className="grid grid-cols-2 gap-2 bg-slate-950 p-1 rounded-xl border border-slate-850">
                                    <button onClick={() => setUploadTarget('polytech')} className={`py-1.5 text-xs font-bold rounded-lg ${uploadTarget === 'polytech' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>Polytech</button>
                                    <button onClick={() => setUploadTarget('mentor')} className={`py-1.5 text-xs font-bold rounded-lg ${uploadTarget === 'mentor' ? 'bg-orange-600 text-white' : 'text-slate-400'}`}>Mentor</button>
                                </div>
                                <div className="border border-dashed border-slate-800 bg-slate-950 p-6 rounded-xl text-center relative cursor-pointer hover:border-indigo-500 transition">
                                    <input type="file" accept=".csv" onChange={handleManualUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    <span className="text-xs text-indigo-400 block font-bold">Seleziona File CSV</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
